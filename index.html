<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/LiteNeTX_logo_bwhite.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/LiteNeTX_logo_bwhite.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/LiteNeTX_logo_bwhite.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiteNeTX</title>
  <meta name="description"
    content="LiteNeTX features two lightweight CNN models trained from scratch for real-time image classification. Try our FashionMNIST and CIFAR-10 demos." />
  <meta name="author" content="LiteNeTX" />

  <meta property="og:title" content="LiteNeTX — Custom CNN Models" />
  <meta property="og:description"
    content="Two lightweight CNNs trained from scratch and deployed for real-time inference." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LiteNeTX — Custom CNN Models" />
  <meta name="twitter:description"
    content="Two lightweight CNNs trained from scratch and deployed for real-time inference." />

  <!-- Fonts: Optimized for performance and layout stability -->
  <!-- DNS prefetch and preconnect for faster font loading -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload critical Inter font to prevent FOIT (Flash of Invisible Text) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">

  <!-- Fallback if JS is disabled -->
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet">
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
